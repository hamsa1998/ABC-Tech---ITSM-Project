<!DOCTYPE html>
<html>
<head>
    <title>ITSM Incident Prediction</title>
    <style>
        body {font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f9;}
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1);}
        input {width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;}
        button {width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;}
        button:hover {background-color: #0056b3;}
        .result {margin-top: 20px; font-weight: bold; color: #333;text-align: center;}
    </style>
</head>
<body>
    <div class="container">
        <h2>Predict Incident Priority</h2>
        <form action="{{ url_for('predict') }}" method="post">
            <label>Impact Level(e.g., Impact ID)</label>
            <input type="text" name="Impact" placeholder="Enter Impact (1-3)" required="required">
            <label>Urgency Level(e.g., Urgency ID)</label>
            <input type=" text" name="Urgency" placeholder="Enter Urgency (1-4)" required="required">
            <label>Incident Category</label>
            <input type="text" name="Incident Category" placeholder="Enter Category ID" required="required">
            <label>Location</label>
            <input type="text" name="Location" placeholder="Enter Location Code" required="required">
            <label>Service Area</label>
            <input type="text" name="Service" placeholder="Enter Service ID" required="required">
            <label>User Group</label>
            <input type="text" name="user_group" placeholder="Enter Group ID" required="required">
            <button type="submit">Predict Priority Now</button>
        </form>

        <div class="result">
            <h3>{{ prediction_text }}</h3>
        </div>
    </div>
</body>
</html>
