<!DOCTYPE html>
<html>
<head>
    <title>ITSM Incident Prediction</title>
    <style>
        body {font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f9;}
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1);}
        input {width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;}
        button {width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;}
        button:hover {background-color: #0056b3;}
        .result {margin-top: 20px; font-weight: bold; color: #333;text-align: center;}
    </style>
</head>
<body>
    <div class="container">
        <h2>Predict Incident Priority</h2>
    <form action="{{ url_for('predict') }}" method="post">
        <label>CI Category</label>
        <input type="text" name="CI_Cat" placeholder="Enter CI_Cat (1-6)" required>
        <label>CI Subcategory</label>
        <input type="text" name="CI_Subcat" placeholder="Enter CI_Subcat (1-17)" required>
        <label>WBS</label>
        <input type="text" name="WBS" placeholder="Enter WBS" required>
        <label>Category</label>
        <input type="text" name="Category" placeholder="Enter Category (0-2)" required>
        <button type="submit">Predict Priority Now</button>
    </form>
    {% if prediction_text %}
    <div class="result">
        {{ prediction_text }}
    </div>
    {% endif %}
</body>
</html>
